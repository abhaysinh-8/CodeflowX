name: CodeFlowX CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install tree-sitter tree-sitter-python tree-sitter-javascript tree-sitter-java pytest fastapi uvicorn slowapi PyJWT cryptography python-multipart
    - name: Run tests
      run: |
        export PYTHONPATH=$(pwd)
        pytest backend/tests/

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: cd frontend && npm ci
    - name: Lint
      run: cd frontend && npm run lint
    - name: Type-check
      run: cd frontend && npx tsc --noEmit
    - name: Run tests
      run: cd frontend && npm run test --if-present 2>/dev/null || echo "No test script configured — skipping"
